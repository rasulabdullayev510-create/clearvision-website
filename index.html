<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title id="page-title">Home</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="config.js"></script>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow" id="hero-eyebrow"></div>
    <h1 id="hero-h1"></h1>
    <p class="hero-sub" id="hero-sub"></p>
    <div class="hero-actions">
      <a class="btn btn-primary" id="hero-book" href="#">Book Now</a>
      <a class="btn btn-outline" href="services.html">View Services</a>
    </div>
    <div class="hero-stats" id="hero-stats"></div>
  </div>
</section>

<!-- Services preview -->
<section class="section">
  <div class="wrap">
    <div class="section-label"><span id="svc-eyebrow"></span></div>
    <h2 class="section-title" id="svc-title"></h2>
    <p class="section-sub" id="svc-sub"></p>
    <div class="services-grid" id="services-grid"></div>
    <div style="margin-top:36px;text-align:center">
      <a href="services.html" class="btn btn-light">See All Services & Pricing →</a>
    </div>
  </div>
</section>

<!-- Process -->
<section class="section section-alt">
  <div class="wrap">
    <div class="section-label"><span id="proc-eyebrow"></span></div>
    <h2 class="section-title" id="proc-title"></h2>
    <div class="process-list" id="process-list"></div>
  </div>
</section>

<!-- CTA band -->
<section class="cta-band">
  <div class="wrap-narrow">
    <h2>Ready to book your appointment?</h2>
    <p>Online booking takes 60 seconds. Confirmation text sent instantly.</p>
    <a class="btn btn-outline" id="cta-book" href="#">Book Now →</a>
  </div>
</section>

<footer class="footer" id="footer"></footer>

<script src="components.js"></script>
<script>
  const C = window.CLIENT;
  document.documentElement.style.setProperty('--primary', C.primaryColor || '#2563eb');
  document.documentElement.style.setProperty('--primary-dark', C.primaryDark || '#1d4ed8');
  document.getElementById('page-title').textContent = C.name + ' — Home';

  renderNav('index.html');
  renderFooter();

  // Hero
  document.getElementById('hero-eyebrow').textContent = C.heroEyebrow || '';
  const hl = C.heroHeadline || '', hi = C.heroHighlight || '';
  document.getElementById('hero-h1').innerHTML = hi
    ? hl.replace(hi, '<span class="hl">' + hi + '</span>') : hl;
  document.getElementById('hero-sub').textContent = C.heroSub || '';
  document.getElementById('hero-book').href = C.bookingUrl || '#';
  document.getElementById('cta-book').href = C.bookingUrl || '#';
  const statsEl = document.getElementById('hero-stats');
  (C.heroStats || []).forEach(function(s) {
    statsEl.innerHTML += '<div><div class="hero-stat-val">' + s.value + '</div><div class="hero-stat-lbl">' + s.label + '</div></div>';
  });

  // Services (first 4)
  document.getElementById('svc-eyebrow').textContent = C.servicesEyebrow || 'Services';
  document.getElementById('svc-title').textContent = C.servicesTitle || '';
  document.getElementById('svc-sub').textContent = C.servicesSub || '';
  const svcGrid = document.getElementById('services-grid');
  (C.services || []).slice(0, 4).forEach(function(s) {
    svcGrid.innerHTML += '<div class="service-card"><div class="service-icon">' + (s.icon || '✦') + '</div><h3>' + s.name + '</h3><p>' + s.description + '</p></div>';
  });

  // Process
  document.getElementById('proc-eyebrow').textContent = C.processEyebrow || 'Process';
  document.getElementById('proc-title').textContent = C.processTitle || '';
  const procList = document.getElementById('process-list');
  (C.process || []).forEach(function(step) {
    procList.innerHTML += '<div class="process-step"><div class="step-num">' + step.icon + '</div><h3>' + step.title + '</h3><p>' + step.desc + '</p></div>';
  });
</script>
</body>
</html>
